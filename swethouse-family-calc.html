<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حسابات الأسر — سويت هاوس</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #C8A96E;
    --accent-dim: rgba(200,169,110,0.15);
    --accent-border: rgba(200,169,110,0.35);
    --bg: #141414;
    --bg-card: #1E1E1E;
    --bg-input: #282828;
    --bg-result: #1A1A1A;
    --border: rgba(255,255,255,0.07);
    --border-mid: rgba(255,255,255,0.12);
    --text: #F0EDE8;
    --text-soft: #9A9590;
    --text-ghost: #5A5652;
    --radius-sm: 8px;
    --radius-lg: 18px;
    --font: 'Cairo', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
  }

  header {
    background: rgba(20,20,20,0.9);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    height: 56px;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .logo-text { font-size: 14px; font-weight: 700; color: var(--text); }
  .logo-sub { font-size: 11px; color: var(--text-soft); font-weight: 400; display: block; line-height: 1.1; }

  .hero {
    border-bottom: 1px solid var(--border);
    padding: 2.25rem 2rem 2rem;
    text-align: center;
  }

  .hero h1 {
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.4px;
  }

  .hero h1 span { color: var(--accent); }

  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.75rem;
  }

  .rates-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.75rem;
    padding: 0.8rem 1rem;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
  }

  .rate-item { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--text-soft); }
  .rate-item strong { font-size: 14px; font-weight: 700; color: var(--accent); }
  .rate-divider { width: 1px; height: 16px; background: var(--border-mid); }
  .lock-icon { font-size: 11px; color: var(--text-ghost); margin-right: auto; }

  .tabs {
    display: flex;
    background: var(--bg-input);
    border-radius: var(--radius-sm);
    padding: 3px;
    margin-bottom: 1.75rem;
    gap: 3px;
  }

  .tab-btn {
    flex: 1;
    padding: 9px 12px;
    border: none;
    background: transparent;
    border-radius: 6px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-soft);
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab-btn.active {
    background: var(--bg-card);
    color: var(--accent);
    border: 1px solid var(--accent-border);
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .field { margin-bottom: 1.5rem; }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-soft);
    margin-bottom: 8px;
    letter-spacing: 0.02em;
  }

  .input-wrap { position: relative; }

  .input-wrap input {
    width: 100%;
    padding: 14px 16px;
    padding-left: 60px;
    border: 1px solid var(--border-mid);
    border-radius: var(--radius-sm);
    font-family: var(--font);
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    background: var(--bg-input);
    direction: ltr;
    text-align: right;
    transition: all 0.15s;
    -moz-appearance: textfield;
  }

  .input-wrap input::-webkit-outer-spin-button,
  .input-wrap input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .input-wrap input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .input-wrap input::placeholder { color: var(--text-ghost); }

  .input-suffix {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    font-weight: 700;
    color: var(--text-ghost);
    pointer-events: none;
  }

  .result-empty {
    text-align: center;
    padding: 2rem;
    color: var(--text-ghost);
    font-size: 13px;
    border: 1px dashed rgba(255,255,255,0.1);
    border-radius: var(--radius-sm);
  }

  .result-main {
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    border-radius: var(--radius-sm);
    padding: 1.75rem;
    text-align: center;
  }

  .result-main-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 8px;
    opacity: 0.85;
  }

  .result-main-value {
    font-size: 48px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -1px;
    direction: ltr;
  }

  .result-main-unit {
    font-size: 15px;
    font-weight: 400;
    opacity: 0.6;
    margin-right: 4px;
  }

  @keyframes pop {
    0% { opacity: 0; transform: scale(0.97) translateY(4px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  .result-main { animation: pop 0.18s ease both; }

  footer {
    text-align: center;
    padding: 2rem;
    border-top: 1px solid var(--border);
    margin-top: 1rem;
    font-size: 12px;
    color: var(--text-ghost);
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-icon">🍬</div>
    <div>
      <span class="logo-text">سويت هاوس</span>
      <span class="logo-sub">حسابات الأسر</span>
    </div>
  </div>
</header>

<div class="hero">
  <h1>حسابات <span>الأسر</span></h1>
</div>

<main>
  <div class="card">

    <div class="rates-row">
      <div class="rate-item">
        <span>نسبة الفرع</span>
        <strong>20%</strong>
      </div>
      <div class="rate-divider"></div>
      <div class="rate-item">
        <span>ضريبة القيمة المضافة</span>
        <strong>15%</strong>
      </div>
      <span class="lock-icon">🔒</span>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('cost')" id="tab-cost-btn">من سعر الشراء</button>
      <button class="tab-btn" onclick="switchTab('price')" id="tab-price-btn">من سعر البيع للعميل</button>
    </div>

    <div class="tab-panel active" id="panel-cost">
      <div class="field">
        <label>سعر الشراء من الأسرة (ريال)</label>
        <div class="input-wrap">
          <input type="number" id="cost-input" placeholder="0.00" step="0.01" min="0" oninput="calcFromCost()">
          <span class="input-suffix">ريال</span>
        </div>
      </div>
      <div id="cost-result-area">
        <div class="result-empty">أدخل سعر الشراء لتظهر النتيجة</div>
      </div>
    </div>

    <div class="tab-panel" id="panel-price">
      <div class="field">
        <label>سعر البيع للعميل شامل الضريبة (ريال)</label>
        <div class="input-wrap">
          <input type="number" id="price-input" placeholder="0.00" step="0.01" min="0" oninput="calcFromPrice()">
          <span class="input-suffix">ريال</span>
        </div>
      </div>
      <div id="price-result-area">
        <div class="result-empty">أدخل سعر البيع لتظهر النتيجة</div>
      </div>
    </div>

  </div>
</main>

<footer>حسابات سويت هاوس</footer>

<script>
  const BRANCH = 0.20;
  const VAT = 0.15;
  function fmt(n) { return n.toFixed(2); }

  function switchTab(tab) {
    document.getElementById('tab-cost-btn').classList.toggle('active', tab === 'cost');
    document.getElementById('tab-price-btn').classList.toggle('active', tab === 'price');
    document.getElementById('panel-cost').classList.toggle('active', tab === 'cost');
    document.getElementById('panel-price').classList.toggle('active', tab === 'price');
  }

  function calcFromCost() {
    const cost = parseFloat(document.getElementById('cost-input').value);
    const area = document.getElementById('cost-result-area');
    if (!cost || cost <= 0) { area.innerHTML = '<div class="result-empty">أدخل سعر الشراء لتظهر النتيجة</div>'; return; }
    const afterTax = (cost / (1 - BRANCH)) * (1 + VAT);
    area.innerHTML = `<div class="result-main"><div class="result-main-label">سعر البيع للعميل (شامل الضريبة)</div><div class="result-main-value">${fmt(afterTax)} <span class="result-main-unit">ريال</span></div></div>`;
  }

  function calcFromPrice() {
    const price = parseFloat(document.getElementById('price-input').value);
    const area = document.getElementById('price-result-area');
    if (!price || price <= 0) { area.innerHTML = '<div class="result-empty">أدخل سعر البيع لتظهر النتيجة</div>'; return; }
    const cost = (price / (1 + VAT)) * (1 - BRANCH);
    area.innerHTML = `<div class="result-main"><div class="result-main-label">سعر الشراء من الأسرة (حساب الأسرة)</div><div class="result-main-value">${fmt(cost)} <span class="result-main-unit">ريال</span></div></div>`;
  }
</script>
</body>
</html>
